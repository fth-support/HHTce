name: Build Windows EXE

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4 # อัปเดตเป็น v4

    - name: Set up Python
      uses: actions/setup-python@v5 # อัปเดตเป็น v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --noconsole --onefile --name "HHT_Bridge_v1" main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4 # แก้จุดที่ติด Error (v3 -> v4)
      with:
        name: HHT-Bridge-EXE
        path: dist/HHT_Bridge_v1.exe
